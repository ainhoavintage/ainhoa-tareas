<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>Ainhoa · Tareas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
  :root{
    --crema: #FDFBF7;
    --tarjeta: #FFFFFF;
    --negro: #26221E;
    --gris: #786F63;
    --gris-claro: #C3BAAB;
    --terracota: #B5573C;
    --terracota-suave: #F1DCD3;
    --oliva: #707A4E;
    --oliva-suave: #E4E7D6;
    --mostaza: #C99A3A;
    --mostaza-suave: #F3E6C8;
    --borde: #EDE7DA;
    --radius: 14px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  body{
    margin:0; background:var(--crema); color:var(--negro);
    font-family:'Inter',sans-serif;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  .voz{ font-family:'Fraunces',serif; }
  #app{ max-width:480px; margin:0 auto; min-height:100vh; display:flex; flex-direction:column; position:relative; background:var(--crema); }

  /* ---------- LOGIN ---------- */
  .login-wrap{ flex:1; display:flex; flex-direction:column; justify-content:center; padding:32px 24px; }
  .login-title{ font-family:'Fraunces',serif; font-size:28px; text-align:center; margin-bottom:4px; }
  .login-sub{ text-align:center; color:var(--gris); font-size:14px; margin-bottom:32px; }
  .personas{ display:flex; flex-direction:column; gap:12px; }
  .persona-tag{
    position:relative; background:var(--tarjeta); border:1px solid var(--borde); border-radius:12px;
    padding:20px 22px; font-size:17px; font-weight:500; text-align:left; cursor:pointer;
    display:flex; align-items:center; gap:14px; box-shadow:0 1px 3px rgba(38,34,30,.04);
  }
  .persona-tag:active{ transform:scale(.98); background:var(--borde); }
  .persona-tag .av{
    width:38px; height:38px; border-radius:50%; display:flex; align-items:center; justify-content:center;
    font-family:'Fraunces',serif; font-size:15px;
  }
  .pin-wrap{ display:flex; flex-direction:column; align-items:center; padding:32px 24px; flex:1; justify-content:center; }
  .pin-back{ align-self:flex-start; background:none; border:none; color:var(--gris); font-size:15px; display:flex; align-items:center; gap:4px; margin-bottom:24px; cursor:pointer; padding:8px 0; }
  .pin-dots{ display:flex; gap:14px; margin:20px 0 28px; }
  .pin-dot{ width:14px; height:14px; border-radius:50%; border:1.5px solid var(--gris-claro); }
  .pin-dot.filled{ background:var(--terracota); border-color:var(--terracota); }
  .pin-pad{ display:grid; grid-template-columns:repeat(3,70px); gap:16px; }
  .pin-key{ width:70px; height:70px; border-radius:50%; background:var(--tarjeta); border:1px solid var(--borde); font-size:22px; font-family:'Fraunces',serif; box-shadow:0 1px 3px rgba(38,34,30,.04); }
  .pin-key:active{ background:var(--borde); transform:scale(.95); }
  .pin-key.borrar{ font-size:19px; color:var(--terracota); }
  .pin-error{ color:var(--terracota); font-size:13px; margin-top:14px; min-height:16px; }

  /* ---------- HEADER / SCREENS ---------- */
  .screen{ display:none; flex:1; flex-direction:column; padding:22px 18px 12px; }
  .screen.activa{ display:flex; }
  .saludo{ font-family:'Fraunces',serif; font-size:23px; }
  .subsaludo{ font-size:13px; color:var(--gris); margin:2px 0 14px; }

  .greeting-card{
    background:var(--tarjeta); border:1px solid var(--borde); border-radius:16px; padding:18px 18px 16px;
    margin-bottom:18px; box-shadow:0 1px 4px rgba(38,34,30,.05);
  }
  .greeting-card .saludo{ margin-bottom:2px; }
  .greeting-stats{ display:flex; gap:18px; margin-top:12px; }
  .greeting-stat{ display:flex; align-items:center; gap:7px; font-size:13px; color:var(--gris); }
  .greeting-stat i{ font-size:17px; color:var(--terracota); }
  .barra-progreso{ height:7px; background:var(--crema); border-radius:4px; overflow:hidden; margin-top:12px; border:1px solid var(--borde); }
  .barra-progreso .fill{ height:100%; background:var(--oliva); border-radius:4px; transition:width .3s; }

  /* anotado rapido (solo Angie) */
  .quickadd-card{
    background:var(--terracota-suave); border-radius:16px; padding:16px 16px 14px; margin-bottom:18px;
  }
  .quickadd-titulo{ font-size:12px; font-weight:600; color:#8a3c28; text-transform:uppercase; letter-spacing:.05em; margin-bottom:8px; display:flex; align-items:center; gap:6px; }
  .quickadd-row{ display:flex; gap:8px; align-items:flex-end; }
  .quickadd-row textarea{
    flex:1; border:1px solid #dcbfb2; border-radius:10px; padding:10px 12px; font-family:'Inter',sans-serif;
    font-size:14px; background:#fff; resize:none; min-height:44px;
  }
  .mic-btn{
    width:46px; height:46px; border-radius:50%; background:var(--terracota); color:#fff; border:none;
    display:flex; align-items:center; justify-content:center; font-size:19px; flex-shrink:0;
  }
  .mic-btn.grabando{ background:#8a3c28; animation:pulso 1s infinite; }
  @keyframes pulso{ 0%{box-shadow:0 0 0 0 rgba(138,60,40,.4);} 70%{box-shadow:0 0 0 10px rgba(138,60,40,0);} 100%{box-shadow:0 0 0 0 rgba(138,60,40,0);} }
  .quickadd-guardar{ margin-top:10px; width:100%; }
  .quickadd-nota{ font-size:11px; color:#8a3c28; margin-top:6px; opacity:.75; }

  .seccion-label{ font-size:11.5px; text-transform:uppercase; letter-spacing:.06em; font-weight:600; margin:0 0 9px 2px; }
  .seccion-label.prioridad{ color:var(--terracota); }
  .seccion-label.curso{ color:var(--mostaza); }
  .seccion-label.libre{ color:var(--oliva); }

  /* tarjeta tipo etiqueta de ropa vintage */
  .tarjeta{
    position:relative; background:var(--tarjeta); border-radius:12px; padding:14px 14px 14px 18px;
    margin-bottom:10px; display:flex; justify-content:space-between; align-items:center; gap:10px;
    border:1px solid var(--borde); border-left-width:4px; box-shadow:0 1px 3px rgba(38,34,30,.04);
  }
  .tarjeta:active{ background:var(--crema); }
  .tarjeta.borde-prioridad{ border-left-color:var(--terracota); }
  .tarjeta.borde-curso{ border-left-color:var(--mostaza); }
  .tarjeta.borde-libre{ border-left-color:var(--oliva); border-style:dashed; }
  .tarjeta::before{
    content:''; position:absolute; left:-4px; top:18px; width:9px; height:9px; border-radius:50%;
    background:var(--crema); border:1px solid var(--borde);
  }
  .tarjeta-info{ display:flex; align-items:center; gap:11px; min-width:0; flex:1; }
  .tarjeta-info i{ font-size:19px; color:var(--gris); flex-shrink:0; }
  .tarjeta-titulo{ font-size:15px; font-weight:500; }
  .tarjeta-meta{ font-size:12px; color:var(--gris); margin-top:2px; }
  .btn{
    font-family:'Inter',sans-serif; font-size:13.5px; font-weight:600; padding:10px 16px; border-radius:22px;
    border:none; cursor:pointer; white-space:nowrap; flex-shrink:0; min-height:40px;
    transition:transform .1s, opacity .1s;
  }
  .btn:active{ transform:scale(.94); opacity:.85; }
  .btn:disabled{ opacity:.55; }
  .btn-terracota{ background:var(--terracota); color:#fff; }
  .btn-oliva{ background:var(--oliva); color:#fff; }
  .btn-fantasma{ background:transparent; border:1px solid var(--borde); color:var(--negro); }
  .btn-grande{ width:100%; padding:13px; font-size:15px; }

  .posta-card{
    background:var(--mostaza-suave); border-radius:12px; padding:14px 16px; margin-bottom:18px;
    display:flex; gap:10px; align-items:flex-start;
  }
  .posta-card i{ color:#8a6a1e; font-size:18px; margin-top:1px; }
  .posta-titulo{ font-size:11.5px; font-weight:600; color:#8a6a1e; text-transform:uppercase; letter-spacing:.04em; }
  .posta-texto{ font-size:14px; margin-top:3px; }
  .posta-acciones{ display:flex; gap:8px; margin-top:10px; }

  .vacio{ text-align:center; color:var(--gris); font-size:13.5px; padding:24px 0; }

  /* Equipo (Angie) */
  .persona-resumen{
    background:var(--tarjeta); border:1px solid var(--borde); border-radius:12px; padding:14px 16px;
    display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;
    box-shadow:0 1px 3px rgba(38,34,30,.04);
  }
  .persona-resumen .izq{ display:flex; align-items:center; gap:12px; }
  .avatar{ width:38px; height:38px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-family:'Fraunces',serif; font-size:14px; }

  .alerta-sinresp{ background:var(--terracota-suave); color:#8a3c28; border-radius:12px; padding:12px 15px; font-size:13.5px; display:flex; align-items:center; gap:9px; margin-bottom:8px; }
  .racha-linea{ border-top:1px solid var(--borde); margin-top:14px; padding-top:12px; font-size:12.5px; color:var(--gris); display:flex; align-items:center; gap:6px; }

  /* Nav inferior */
  .nav-inferior{
    display:flex; justify-content:space-around; align-items:center; padding:12px 4px calc(12px + env(safe-area-inset-bottom));
    border-top:1px solid var(--borde); background:var(--crema); position:sticky; bottom:0;
  }
  .nav-item{ display:flex; flex-direction:column; align-items:center; gap:4px; background:none; border:none; color:var(--gris-claro); padding:6px 10px; }
  .nav-item i{ font-size:22px; }
  .nav-item span{ font-size:10.5px; }
  .nav-item.activo{ color:var(--terracota); }

  /* boton crear tarea dentro de la pestaña Tareas */
  .btn-crear-tab{
    display:flex; align-items:center; justify-content:center; gap:8px; width:100%; padding:14px;
    background:var(--terracota); color:#fff; border:none; border-radius:14px; font-size:15px; font-weight:600;
    margin-bottom:16px; transition:transform .1s;
  }
  .btn-crear-tab:active{ transform:scale(.97); }

  /* filtros tareas */
  .filtros{ display:flex; gap:8px; overflow-x:auto; padding-bottom:10px; margin-bottom:4px; }
  .filtro-chip{ font-size:12.5px; padding:8px 14px; border-radius:20px; border:1px solid var(--borde); background:var(--tarjeta); white-space:nowrap; color:var(--gris); }
  .filtro-chip.activo{ background:var(--negro); color:var(--crema); border-color:var(--negro); }

  /* modal simple */
  .overlay{ position:fixed; inset:0; background:rgba(38,34,30,.45); display:none; align-items:flex-end; z-index:20; }
  .overlay.activo{ display:flex; }
  .modal{ background:var(--crema); width:100%; max-width:480px; margin:0 auto; border-radius:22px 22px 0 0; padding:22px 20px calc(22px + env(safe-area-inset-bottom)); max-height:88vh; overflow-y:auto; }
  .modal h3{ font-family:'Fraunces',serif; font-weight:500; margin:0 0 14px; font-size:19px; }
  .modal label{ font-size:12.5px; color:var(--gris); display:block; margin:13px 0 5px; }
  .modal input, .modal select, .modal textarea{
    width:100%; padding:11px 13px; border-radius:9px; border:1px solid var(--borde); background:var(--tarjeta);
    font-family:'Inter',sans-serif; font-size:14.5px;
  }
  .modal textarea{ resize:vertical; min-height:60px; }
  .modal-acciones{ display:flex; gap:10px; margin-top:20px; }
  .modal-acciones .btn{ flex:1; padding:13px; font-size:14.5px; }
  .cerrar-modal{ background:none; border:none; float:right; font-size:22px; color:var(--gris); padding:4px 8px; }
  .detalle-meta{ font-size:13px; color:var(--gris); margin-bottom:14px; }
  .detalle-checklist-item{ display:flex; align-items:center; gap:8px; font-size:14px; padding:6px 0; }

  .toast{
    position:fixed; top:16px; left:50%; transform:translateX(-50%); background:var(--negro); color:var(--crema);
    padding:11px 20px; border-radius:20px; font-size:13.5px; z-index:30; opacity:0; transition:opacity .25s; pointer-events:none;
  }
  .toast.mostrar{ opacity:1; }

  .placeholder-tab{ text-align:center; color:var(--gris); padding:60px 20px; font-size:14px; }
</style>
</head>
<body>
<div id="app">

  <!-- LOGIN: selección de persona -->
  <div class="login-wrap" id="pantalla-login">
    <div class="login-title voz">Ainhoa Tareas</div>
    <div class="login-sub">¿Quién sos?</div>
    <div class="personas">
      <button class="persona-tag" data-persona="Angie"><span class="av" style="background:var(--terracota-suave);color:#8a3c28;">A</span><span>Angie</span></button>
      <button class="persona-tag" data-persona="Laurita"><span class="av" style="background:var(--oliva-suave);color:#4a5233;">L</span><span>Laurita</span></button>
      <button class="persona-tag" data-persona="Solchi"><span class="av" style="background:var(--mostaza-suave);color:#8a6a1e;">S</span><span>Solchi</span></button>
    </div>
  </div>

  <!-- LOGIN: PIN -->
  <div class="pin-wrap" id="pantalla-pin" style="display:none;">
    <button class="pin-back" id="btn-volver-login"><i class="ti ti-chevron-left"></i>Volver</button>
    <div class="login-sub" id="pin-nombre" style="margin-bottom:0;">Hola</div>
    <div class="pin-dots" id="pin-dots"></div>
    <div class="pin-pad" id="pin-pad"></div>
    <div class="pin-error" id="pin-error"></div>
  </div>

  <!-- HOY -->
  <div class="screen" id="pantalla-hoy">
    <div id="hoy-contenido"><div class="vacio">Cargando…</div></div>
  </div>

  <!-- TAREAS (lista completa) -->
  <div class="screen" id="pantalla-tareas">
    <div class="saludo voz">Tareas</div>
    <div class="subsaludo">Todo lo que hay cargado</div>
    <button class="btn-crear-tab" id="btn-crear"><i class="ti ti-plus"></i>Crear tarea</button>
    <div class="filtros" id="filtros-tareas"></div>
    <div id="tareas-lista"><div class="vacio">Cargando…</div></div>
  </div>

  <!-- EQUIPO -->
  <div class="screen" id="pantalla-equipo">
    <div class="saludo voz">Equipo</div>
    <div class="subsaludo">Vista rápida por persona</div>
    <div id="equipo-contenido"><div class="vacio">Cargando…</div></div>
  </div>

  <!-- PERFIL -->
  <div class="screen" id="pantalla-perfil">
    <div class="saludo voz">Perfil</div>
    <div class="placeholder-tab">Acá va tu racha, tareas libres tomadas esta semana, y cerrar sesión.<br><br><button class="btn btn-fantasma" id="btn-logout">Cerrar sesión</button></div>
  </div>

  <!-- Nav inferior -->
  <div class="nav-inferior" id="nav-inferior" style="display:none;">
    <button class="nav-item activo" data-tab="hoy"><i class="ti ti-sun"></i><span>Hoy</span></button>
    <button class="nav-item" data-tab="tareas"><i class="ti ti-list-check"></i><span>Tareas</span></button>
    <button class="nav-item" data-tab="equipo"><i class="ti ti-users"></i><span>Equipo</span></button>
    <button class="nav-item" data-tab="perfil"><i class="ti ti-user"></i><span>Perfil</span></button>
  </div>

  <!-- Modal crear tarea -->
  <div class="overlay" id="overlay-crear">
    <div class="modal">
      <button class="cerrar-modal" id="cerrar-crear">×</button>
      <h3>Nueva tarea</h3>
      <label>Título</label>
      <input type="text" id="f-titulo" placeholder="Ej: Vaciar percheros">
      <label>Descripción (opcional)</label>
      <textarea id="f-descripcion" placeholder="Detalle si hace falta"></textarea>
      <label>Categoría</label>
      <input type="text" id="f-categoria" placeholder="Showroom, stock, proveedoras…">
      <label>¿Para quién?</label>
      <select id="f-tipo">
        <option value="General">General (libre para tomar)</option>
        <option value="Asignada">Asignada a alguien</option>
      </select>
      <div id="wrap-responsable" style="display:none;">
        <label>Responsable</label>
        <select id="f-responsable">
          <option value="Laurita">Laurita</option>
          <option value="Solchi">Solchi</option>
          <option value="Angie">Angie</option>
        </select>
      </div>
      <label>Prioridad</label>
      <select id="f-prioridad">
        <option value="Alta">Alta</option>
        <option value="Media" selected>Media</option>
        <option value="Baja">Baja</option>
      </select>
      <label>Fecha límite</label>
      <input type="date" id="f-fecha">
      <label>Duración estimada (minutos)</label>
      <input type="number" id="f-duracion" placeholder="Ej: 20">
      <div class="modal-acciones">
        <button class="btn btn-fantasma" id="cancelar-crear">Cancelar</button>
        <button class="btn btn-terracota" id="guardar-crear">Crear tarea</button>
      </div>
    </div>
  </div>

  <!-- Modal detalle / editar tarea -->
  <div class="overlay" id="overlay-detalle">
    <div class="modal">
      <button class="cerrar-modal" id="cerrar-detalle">×</button>
      <h3 id="detalle-titulo">Tarea</h3>
      <div class="detalle-meta" id="detalle-meta"></div>
      <label>Título</label>
      <input type="text" id="d-titulo">
      <label>Descripción</label>
      <textarea id="d-descripcion"></textarea>
      <label>Categoría</label>
      <input type="text" id="d-categoria">
      <label>Prioridad</label>
      <select id="d-prioridad">
        <option value="Alta">Alta</option>
        <option value="Media">Media</option>
        <option value="Baja">Baja</option>
      </select>
      <label>Duración estimada (minutos)</label>
      <input type="number" id="d-duracion">
      <div id="d-checklist-wrap" style="display:none;">
        <label>Checklist</label>
        <div id="d-checklist"></div>
      </div>
      <label>Comentario / posta</label>
      <textarea id="d-comentario" placeholder="Dejá una nota o posta acá"></textarea>
      <div class="modal-acciones">
        <button class="btn btn-fantasma" id="d-guardar-cambios">Guardar cambios</button>
        <button class="btn btn-terracota" id="d-guardar-comentario">Guardar nota</button>
      </div>
      <div class="modal-acciones" style="margin-top:8px;">
        <button class="btn btn-oliva btn-grande" id="d-marcar-hecha">Marcar como hecha</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>
</div>

<script>
/* ======================= CONFIG ======================= */
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyZbEeODB-LF71H32WLSJafEKpl4sQNzMEiNQ2nvxK6LjNc1pmX0NMEbKSi5s7EXk9d/exec';
const DURACION_DEFAULT_MIN = 20; // si una tarea no tiene duración cargada, se estima esto

/* ======================= ESTADO ======================= */
let estado = {
  persona: null,
  pinBuffer: '',
  tareas: [],
  filtroActivo: 'todas',
  tareaSeleccionadaId: null,
  reconocimiento: null,
  grabando: false
};

/* ======================= HELPERS ======================= */
function llamar(params){
  const url = new URL(APPS_SCRIPT_URL);
  Object.keys(params).forEach(k => url.searchParams.set(k, params[k]));
  return fetch(url.toString()).then(r => r.json());
}

function mostrarToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('mostrar');
  setTimeout(() => t.classList.remove('mostrar'), 2200);
}

function iconoCategoria(cat){
  const c = (cat || '').toLowerCase();
  if (c.includes('stock') || c.includes('perch')) return 'ti-hanger';
  if (c.includes('prove')) return 'ti-clipboard-check';
  if (c.includes('red')) return 'ti-camera';
  if (c.includes('envio') || c.includes('pedido')) return 'ti-package';
  if (c.includes('personal')) return 'ti-user';
  return 'ti-tag';
}

function estimarMinutos(lista){
  return lista.reduce((acc, t) => acc + (parseInt(t.DuracionEstimada) || DURACION_DEFAULT_MIN), 0);
}

function formatearMinutos(min){
  if (min < 60) return min + ' min';
  const h = Math.floor(min / 60);
  const m = min % 60;
  return h + 'h' + (m ? ' ' + m + 'min' : '');
}

/* ======================= LOGIN ======================= */
document.querySelectorAll('.persona-tag').forEach(btn => {
  btn.addEventListener('click', () => {
    estado.persona = btn.dataset.persona;
    estado.pinBuffer = '';
    document.getElementById('pin-nombre').textContent = 'Hola ' + estado.persona;
    document.getElementById('pantalla-login').style.display = 'none';
    document.getElementById('pantalla-pin').style.display = 'flex';
    renderPinDots();
  });
});

document.getElementById('btn-volver-login').addEventListener('click', () => {
  document.getElementById('pantalla-pin').style.display = 'none';
  document.getElementById('pantalla-login').style.display = 'flex';
});

function renderPinPad(){
  const pad = document.getElementById('pin-pad');
  pad.innerHTML = '';
  const teclas = ['1','2','3','4','5','6','7','8','9','','0','borrar'];
  teclas.forEach(t => {
    const b = document.createElement('button');
    if (t === '') { b.style.visibility = 'hidden'; b.className = 'pin-key'; }
    else if (t === 'borrar') { b.className = 'pin-key borrar'; b.innerHTML = '<i class="ti ti-backspace"></i>'; b.addEventListener('click', () => { estado.pinBuffer = estado.pinBuffer.slice(0,-1); renderPinDots(); }); }
    else { b.className = 'pin-key'; b.textContent = t; b.addEventListener('click', () => onPinDigit(t)); }
    pad.appendChild(b);
  });
}
renderPinPad();

function renderPinDots(){
  const wrap = document.getElementById('pin-dots');
  wrap.innerHTML = '';
  for (let i = 0; i < 4; i++){
    const d = document.createElement('div');
    d.className = 'pin-dot' + (i < estado.pinBuffer.length ? ' filled' : '');
    wrap.appendChild(d);
  }
}

function onPinDigit(d){
  if (estado.pinBuffer.length >= 4) return;
  estado.pinBuffer += d;
  renderPinDots();
  document.getElementById('pin-error').textContent = '';
  if (estado.pinBuffer.length === 4) validarPin();
}

function validarPin(){
  llamar({ action:'checkPin', persona: estado.persona, pin: estado.pinBuffer }).then(res => {
    if (res.ok){
      localStorage.setItem('ainhoa_persona', estado.persona);
      entrarApp();
    } else {
      document.getElementById('pin-error').textContent = 'PIN incorrecto, probá de nuevo';
      estado.pinBuffer = '';
      renderPinDots();
    }
  }).catch(() => {
    document.getElementById('pin-error').textContent = 'No se pudo conectar. Revisá la conexión.';
    estado.pinBuffer = '';
    renderPinDots();
  });
}

window.addEventListener('load', () => {
  const guardada = localStorage.getItem('ainhoa_persona');
  if (guardada){
    estado.persona = guardada;
    entrarApp();
  }
});

document.getElementById('btn-logout').addEventListener('click', () => {
  localStorage.removeItem('ainhoa_persona');
  location.reload();
});

/* ======================= ENTRAR A LA APP ======================= */
function entrarApp(){
  document.getElementById('pantalla-login').style.display = 'none';
  document.getElementById('pantalla-pin').style.display = 'none';
  document.getElementById('nav-inferior').style.display = 'flex';
  document.getElementById('app').classList.add(estado.persona === 'Angie' ? 'rol-angie' : 'rol-colab');
  cambiarTab('hoy');
  cargarTareas();
}

function cargarTareas(){
  llamar({ action:'listarTareas', persona: estado.persona }).then(res => {
    estado.tareas = res.tareas || [];
    renderHoy();
    renderTareas();
    renderEquipo();
  }).catch(() => mostrarToast('No se pudo cargar. Revisá tu conexión.'));
}

/* ======================= NAV ======================= */
document.querySelectorAll('.nav-item').forEach(btn => {
  btn.addEventListener('click', () => cambiarTab(btn.dataset.tab));
});

function cambiarTab(tab){
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('activa'));
  document.getElementById('pantalla-' + tab).classList.add('activa');
  document.querySelectorAll('.nav-item').forEach(b => b.classList.toggle('activo', b.dataset.tab === tab));
}

/* ======================= VISTA HOY ======================= */
function renderHoy(){
  const cont = document.getElementById('hoy-contenido');
  const mias = estado.persona === 'Angie' ? estado.tareas : estado.tareas.filter(t => t.Responsable === estado.persona || t.Tipo === 'General');
  const pendientesMias = mias.filter(t => t.Estado !== 'Hecha');
  const hechas = mias.filter(t => t.Estado === 'Hecha').length;
  const total = mias.length || 1;
  const minutosEstimados = estimarMinutos(pendientesMias);

  let html = `<div class="greeting-card">
    <div class="saludo voz">Hola ${estado.persona}</div>
    <div class="subsaludo">Tenés ${pendientesMias.length} tarea${pendientesMias.length===1?'':'s'} para hoy</div>
    <div class="greeting-stats">
      <div class="greeting-stat"><i class="ti ti-clock"></i>~${formatearMinutos(minutosEstimados)}</div>
      <div class="greeting-stat"><i class="ti ti-check"></i>${hechas}/${total} hechas</div>
    </div>
    <div class="barra-progreso"><div class="fill" style="width:${Math.round((hechas/total)*100)}%"></div></div>
  </div>`;

  if (estado.persona === 'Angie'){
    html += `<div class="quickadd-card">
      <div class="quickadd-titulo"><i class="ti ti-microphone"></i>Anotado rápido</div>
      <div class="quickadd-row">
        <textarea id="quickadd-texto" placeholder="Escribí o dictá una tarea…"></textarea>
        <button class="mic-btn" id="btn-mic"><i class="ti ti-microphone"></i></button>
      </div>
      <button class="btn btn-terracota quickadd-guardar" id="btn-guardar-quickadd">Guardar</button>
      <div class="quickadd-nota">El dictado por voz depende de tu navegador; si no anda, escribilo directo.</div>
    </div>`;

    const porPersona = {};
    ['Laurita','Solchi','Angie'].forEach(p => porPersona[p] = estado.tareas.filter(t => t.Responsable === p && t.Estado !== 'Hecha').length);
    const sinResp = estado.tareas.filter(t => !t.Responsable && t.Estado !== 'Hecha').length;

    ['Laurita','Solchi'].forEach(p => {
      html += `<div class="persona-resumen"><div class="izq"><div class="avatar" style="background:var(--oliva-suave);color:#4a5233;">${p[0]}</div><div><div style="font-size:14.5px;">${p}</div><div style="font-size:12.5px;color:var(--gris);">${porPersona[p]} tarea${porPersona[p]===1?'':'s'} pendiente${porPersona[p]===1?'':'s'}</div></div></div><i class="ti ti-chevron-right" style="color:var(--gris-claro);"></i></div>`;
    });
    if (sinResp > 0){
      html += `<div class="alerta-sinresp"><i class="ti ti-alert-triangle"></i>${sinResp} tarea${sinResp===1?'':'s'} sin responsable</div>`;
    }
    cont.innerHTML = html;
    conectarQuickAdd();
    return;
  }

  const posta = mias.find(t => t.EsPosta === 'SI' && t.Estado !== 'Hecha');
  const prioridad = mias.filter(t => t.Prioridad === 'Alta' && t.Estado !== 'Hecha');
  const curso = mias.filter(t => t.Estado === 'En curso' && t.Prioridad !== 'Alta');
  const libres = mias.filter(t => t.Tipo === 'General' && !t.Responsable && t.Estado === 'Pendiente');

  if (posta){
    html += `<div class="posta-card"><i class="ti ti-note"></i><div><div class="posta-titulo">Posta</div><div class="posta-texto">${posta.Comentario || ''}</div>
      <div class="posta-acciones"><button class="btn btn-terracota" onclick="abrirDetalle('${posta.ID}')">Ver y continuar</button></div></div></div>`;
  }

  html += renderSeccion('Prioridad', prioridad, 'prioridad', 'borde-prioridad');
  html += renderSeccion('En curso', curso, 'curso', 'borde-curso');
  html += renderSeccion('Disponibles', libres, 'libre', 'borde-libre');

  if (!posta && prioridad.length === 0 && curso.length === 0 && libres.length === 0){
    html += '<div class="vacio">Sin tareas por ahora ✨</div>';
  }

  cont.innerHTML = html;
}

function renderSeccion(nombre, lista, clase, bordeClase){
  if (lista.length === 0) return '';
  let html = `<div class="seccion-label ${clase}">${nombre}</div>`;
  lista.forEach(t => { html += tarjetaHTML(t, bordeClase); });
  return html;
}

function tarjetaHTML(t, bordeClase){
  let accion = '';
  if (t.Tipo === 'General' && !t.Responsable && t.Estado === 'Pendiente'){
    accion = `<button class="btn btn-oliva" data-accion="tomar" data-id="${t.ID}">La hago yo</button>`;
  } else if (t.Estado === 'Pendiente'){
    accion = `<button class="btn btn-terracota" data-accion="continuar" data-id="${t.ID}">Empezar</button>`;
  } else if (t.Estado === 'En curso'){
    accion = `<button class="btn btn-terracota" data-accion="hecha" data-id="${t.ID}">Marcar hecha</button>`;
  } else {
    accion = `<button class="btn btn-fantasma" disabled>Hecha</button>`;
  }
  return `<div class="tarjeta ${bordeClase}" data-abrir="${t.ID}">
    <div class="tarjeta-info">
      <i class="ti ${iconoCategoria(t.Categoria)}"></i>
      <div><div class="tarjeta-titulo">${t.Titulo}</div><div class="tarjeta-meta">${t.Categoria || ''}${t.Responsable ? ' · ' + t.Responsable : ''}</div></div>
    </div>${accion}
  </div>`;
}

/* Delegación de eventos para tarjetas (creadas dinámicamente) */
document.addEventListener('click', (e) => {
  const btnAccion = e.target.closest('[data-accion]');
  if (btnAccion){
    e.stopPropagation();
    const id = btnAccion.dataset.id;
    const accion = btnAccion.dataset.accion;
    btnAccion.disabled = true;
    const textoOriginal = btnAccion.textContent;
    if (accion === 'tomar'){ btnAccion.textContent = 'Tomando…'; tomarTarea(id); }
    else if (accion === 'continuar'){ btnAccion.textContent = '...'; continuarTarea(id); }
    else if (accion === 'hecha'){ btnAccion.textContent = 'Guardando…'; marcarHecha(id); }
    return;
  }
  const tarjetaClick = e.target.closest('[data-abrir]');
  if (tarjetaClick){
    abrirDetalle(tarjetaClick.dataset.abrir);
  }
});

/* ======================= ACCIONES DE TAREA ======================= */
function tomarTarea(id){
  llamar({ action:'tomarTarea', id: id, persona: estado.persona }).then(() => {
    mostrarToast('¡Tuya! Ya la tenés asignada');
    cargarTareas();
  });
}

function continuarTarea(id){
  const t = estado.tareas.find(x => x.ID === id);
  if (t && t.Estado === 'Pendiente' && !t.Responsable){
    tomarTarea(id);
  } else {
    marcarHecha(id);
  }
}

function marcarHecha(id){
  llamar({ action:'marcarHecha', id: id, persona: estado.persona }).then(() => {
    mostrarToast('Tarea completada ✓');
    cargarTareas();
  });
}

/* ======================= DETALLE / EDITAR TAREA ======================= */
function abrirDetalle(id){
  const t = estado.tareas.find(x => x.ID === id);
  if (!t) return;
  estado.tareaSeleccionadaId = id;
  document.getElementById('detalle-titulo').textContent = t.Titulo;
  document.getElementById('detalle-meta').textContent = (t.Categoria || 'Sin categoría') + ' · ' + (t.Responsable || 'Sin asignar') + ' · ' + t.Estado;
  document.getElementById('d-titulo').value = t.Titulo || '';
  document.getElementById('d-descripcion').value = t.Descripcion || '';
  document.getElementById('d-categoria').value = t.Categoria || '';
  document.getElementById('d-prioridad').value = t.Prioridad || 'Media';
  document.getElementById('d-duracion').value = t.DuracionEstimada || '';
  document.getElementById('d-comentario').value = t.Comentario || '';

  const checklistWrap = document.getElementById('d-checklist-wrap');
  const checklistDiv = document.getElementById('d-checklist');
  let pasos = [];
  try { pasos = JSON.parse(t.Checklist || '[]'); } catch(err) { pasos = []; }
  if (pasos.length){
    checklistWrap.style.display = 'block';
    checklistDiv.innerHTML = pasos.map((p, i) => `<div class="detalle-checklist-item"><input type="checkbox" ${p.hecho?'checked':''} disabled><span>${p.paso}</span></div>`).join('');
  } else {
    checklistWrap.style.display = 'none';
  }

  document.getElementById('d-marcar-hecha').style.display = t.Estado === 'Hecha' ? 'none' : 'block';
  document.getElementById('overlay-detalle').classList.add('activo');
}

document.getElementById('cerrar-detalle').addEventListener('click', () => document.getElementById('overlay-detalle').classList.remove('activo'));

document.getElementById('d-guardar-cambios').addEventListener('click', () => {
  llamar({
    action: 'editarTarea',
    id: estado.tareaSeleccionadaId,
    titulo: document.getElementById('d-titulo').value,
    descripcion: document.getElementById('d-descripcion').value,
    categoria: document.getElementById('d-categoria').value,
    prioridad: document.getElementById('d-prioridad').value,
    duracionEstimada: document.getElementById('d-duracion').value
  }).then(() => {
    mostrarToast('Cambios guardados');
    document.getElementById('overlay-detalle').classList.remove('activo');
    cargarTareas();
  });
});

document.getElementById('d-guardar-comentario').addEventListener('click', () => {
  const texto = document.getElementById('d-comentario').value.trim();
  if (!texto) return;
  llamar({ action:'dejarPosta', id: estado.tareaSeleccionadaId, nota: texto }).then(() => {
    mostrarToast('Nota guardada');
    document.getElementById('overlay-detalle').classList.remove('activo');
    cargarTareas();
  });
});

document.getElementById('d-marcar-hecha').addEventListener('click', () => {
  marcarHecha(estado.tareaSeleccionadaId);
  document.getElementById('overlay-detalle').classList.remove('activo');
});

/* ======================= ANOTADO RÁPIDO (Angie) ======================= */
function conectarQuickAdd(){
  const btnMic = document.getElementById('btn-mic');
  const btnGuardar = document.getElementById('btn-guardar-quickadd');
  if (!btnMic) return;

  btnMic.addEventListener('click', () => {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition){
      mostrarToast('Tu navegador no soporta dictado por voz, escribilo directo');
      return;
    }
    if (estado.grabando){
      estado.reconocimiento.stop();
      return;
    }
    const reco = new SpeechRecognition();
    reco.lang = 'es-AR';
    reco.interimResults = false;
    reco.onstart = () => { estado.grabando = true; btnMic.classList.add('grabando'); };
    reco.onend = () => { estado.grabando = false; btnMic.classList.remove('grabando'); };
    reco.onresult = (ev) => {
      const texto = ev.results[0][0].transcript;
      const ta = document.getElementById('quickadd-texto');
      ta.value = (ta.value ? ta.value + ' ' : '') + texto;
    };
    reco.onerror = () => { estado.grabando = false; btnMic.classList.remove('grabando'); };
    estado.reconocimiento = reco;
    reco.start();
  });

  btnGuardar.addEventListener('click', () => {
    const texto = document.getElementById('quickadd-texto').value.trim();
    if (!texto) { mostrarToast('Escribí algo primero'); return; }
    llamar({ action:'crearTarea', titulo: texto, categoria:'Personal Angie', tipo:'Asignada', responsable:'Angie', prioridad:'Media' }).then(() => {
      mostrarToast('Anotado');
      document.getElementById('quickadd-texto').value = '';
      cargarTareas();
    });
  });
}

/* ======================= VISTA TAREAS (lista completa) ======================= */
function renderTareas(){
  const filtrosWrap = document.getElementById('filtros-tareas');
  const filtros = ['todas','pendientes','en curso','hechas'];
  filtrosWrap.innerHTML = filtros.map(f => `<button class="filtro-chip${estado.filtroActivo===f?' activo':''}" data-f="${f}">${f}</button>`).join('');
  filtrosWrap.querySelectorAll('.filtro-chip').forEach(chip => {
    chip.addEventListener('click', () => { estado.filtroActivo = chip.dataset.f; renderTareas(); });
  });

  let lista = estado.tareas;
  if (estado.filtroActivo === 'pendientes') lista = lista.filter(t => t.Estado === 'Pendiente');
  if (estado.filtroActivo === 'en curso') lista = lista.filter(t => t.Estado === 'En curso');
  if (estado.filtroActivo === 'hechas') lista = lista.filter(t => t.Estado === 'Hecha');

  const cont = document.getElementById('tareas-lista');
  cont.innerHTML = lista.length ? lista.map(t => tarjetaHTML(t, t.Prioridad === 'Alta' ? 'borde-prioridad' : t.Estado === 'En curso' ? 'borde-curso' : 'borde-libre')).join('') : '<div class="vacio">No hay tareas acá</div>';
}

/* ======================= VISTA EQUIPO ======================= */
function renderEquipo(){
  const cont = document.getElementById('equipo-contenido');
  const personas = ['Angie','Laurita','Solchi'];
  let html = '';
  personas.forEach(p => {
    const suyas = estado.tareas.filter(t => t.Responsable === p);
    const pendientes = suyas.filter(t => t.Estado !== 'Hecha').length;
    const libresTomadas = suyas.filter(t => t.Tipo === 'General').length;
    html += `<div class="persona-resumen"><div class="izq"><div class="avatar" style="background:var(--terracota-suave);color:#8a3c28;">${p[0]}</div>
      <div><div style="font-size:14.5px;">${p}</div><div style="font-size:12.5px;color:var(--gris);">${pendientes} pendiente${pendientes===1?'':'s'} · ${libresTomadas} libres tomadas</div></div></div></div>`;
  });
  cont.innerHTML = html;
}

/* ======================= MODAL CREAR TAREA ======================= */
document.getElementById('btn-crear').addEventListener('click', () => document.getElementById('overlay-crear').classList.add('activo'));
document.getElementById('cerrar-crear').addEventListener('click', () => document.getElementById('overlay-crear').classList.remove('activo'));
document.getElementById('cancelar-crear').addEventListener('click', () => document.getElementById('overlay-crear').classList.remove('activo'));
document.getElementById('f-tipo').addEventListener('change', (e) => {
  document.getElementById('wrap-responsable').style.display = e.target.value === 'Asignada' ? 'block' : 'none';
});
document.getElementById('guardar-crear').addEventListener('click', () => {
  const titulo = document.getElementById('f-titulo').value.trim();
  if (!titulo) { mostrarToast('Poné un título'); return; }
  const tipo = document.getElementById('f-tipo').value;
  llamar({
    action: 'crearTarea',
    titulo: titulo,
    descripcion: document.getElementById('f-descripcion').value,
    categoria: document.getElementById('f-categoria').value,
    tipo: tipo,
    responsable: tipo === 'Asignada' ? document.getElementById('f-responsable').value : '',
    prioridad: document.getElementById('f-prioridad').value,
    fechaLimite: document.getElementById('f-fecha').value,
    duracionEstimada: document.getElementById('f-duracion').value
  }).then(() => {
    mostrarToast('Tarea creada');
    document.getElementById('overlay-crear').classList.remove('activo');
    ['f-titulo','f-descripcion','f-categoria','f-fecha','f-duracion'].forEach(id => document.getElementById(id).value = '');
    cargarTareas();
  });
});
